    <div class="nav-brand">
      <div class="nav-cross"><img src="./PinClipart.com_sadi-clipart_495337 (1).png" alt="KTP LOGO"></div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html" class="nav-link" data-section="home">Home</a></li>

      <h1 class="section-title">Photo Albums</h1>
      <p class="section-sub">Cherished moments from our church community</p>

    <div class="card-grid" id="photosGrid">

        <span>Add albums from the Admin panel.</span>
      </div>
    </div>

  <!-- ── FOOTER ─────────────────────────────────────────────────── -->
  <footer class="footer">
    <div class="footer-cross"><img src="./PinClipart.com_sadi-clipart_495337 (1).png" alt="KTP LOGO"></div>

    <a href="https://www.instagram.com/ktp_saikhamakawn_branch/" target="_blank" rel="noopener noreferrer"

  <!-- ── BACK TO TOP ─────────────────────────────────────────── -->
  <button class="back-to-top" id="backToTop" aria-label="Back to top" title="Back to top">
